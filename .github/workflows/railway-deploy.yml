name: Railway Deploy

on:
  push:
    branches: [main, dev]

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.check.outputs.web }}
      reddit: ${{ steps.check.outputs.reddit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            BASE="origin/dev"
          else
            BASE="HEAD^"
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD^ HEAD)
          if echo "$CHANGED" | grep -qE '^raddit-next/|^\.github/'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^raddit-reddit/|^\.github/'; then
            echo "reddit=true" >> "$GITHUB_OUTPUT"
          else
            echo "reddit=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-web:
    name: Deploy raddit-web (Next.js)
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli@5
      - name: Deploy raddit-web
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --service raddit-web --project b764aecd-7591-4a63-b244-397c27b4f94d --environment production --detach --yes
        working-directory: raddit-next

  deploy-reddit:
    name: Deploy raddit-reddit (Python RPC)
    needs: detect-changes
    if: needs.detect-changes.outputs.reddit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli@5
      - name: Deploy raddit-reddit
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --service raddit-reddit --project b764aecd-7591-4a63-b244-397c27b4f94d --environment production --detach --yes
        working-directory: raddit-reddit
